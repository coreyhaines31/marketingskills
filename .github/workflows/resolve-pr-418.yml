name: Resolve PR 418 metadata

on:
  push:
    branches:
      - feature/market-research-skill
  workflow_dispatch:

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: feature/market-research-skill
          fetch-depth: 0

      - name: Apply resolved release metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          marketplace_path = Path('.claude-plugin/marketplace.json')
          marketplace = json.loads(marketplace_path.read_text())
          marketplace['metadata']['version'] = '2.9.0'
          description = marketplace['plugins'][0]['description']
          if description.startswith('47 '):
              description = '48 ' + description[3:]
          if 'market research' not in description.lower():
              description = description.replace('prospecting, ', 'prospecting, market research, ', 1)
          marketplace['plugins'][0]['description'] = description
          marketplace_path.write_text(json.dumps(marketplace, ensure_ascii=False, indent=2) + '\n')

          plugin_path = Path('.claude-plugin/plugin.json')
          plugin = json.loads(plugin_path.read_text())
          plugin['version'] = '2.9.0'
          plugin_path.write_text(json.dumps(plugin, ensure_ascii=False, indent=2) + '\n')

          versions_path = Path('VERSIONS.md')
          versions = versions_path.read_text()
          row = '| market-research | 1.0.0 | 2026-07-10 |'
          if row not in versions:
              anchor = '| offers | 1.0.0 | 2026-06-16 |'
              if anchor not in versions:
                  raise SystemExit('VERSIONS.md skill-table anchor not found')
              versions = versions.replace(anchor, row + '\n' + anchor, 1)

          heading = '### 2.9.0 (2026-07-10)'
          if heading not in versions:
              entry = (
                  heading + '\n\n'
                  '- Added `market-research` skill for decision-grade market analysis before positioning, launch, channel, or market-entry decisions. '
                  'Covers market framing, demand signals, transparent TAM/SAM/SOM assumptions, practical segmentation, competitive landscapes, '
                  'white-space analysis, channel economics, market-attractiveness scoring, confidence labels, and enter / narrow / validate / avoid recommendations. '
                  'Includes `references/evidence-and-synthesis.md` for source hierarchy, recency, triangulation, uncertainty handling, and fact / interpretation / implication separation. '
                  'Total skills: 48.\n\n'
              )
              anchor = '## Recent Changes\n\n'
              if anchor not in versions:
                  raise SystemExit('VERSIONS.md changelog anchor not found')
              versions = versions.replace(anchor, anchor + entry, 1)

          versions_path.write_text(versions)
          PY

          python -m json.tool .claude-plugin/marketplace.json >/dev/null
          python -m json.tool .claude-plugin/plugin.json >/dev/null
          git diff --check

      - name: Commit resolved metadata
        run: |
          git config user.name "Mamdouh Aboammar"
          git config user.email "mamdouhfces1997@gmail.com"
          git add .claude-plugin/marketplace.json .claude-plugin/plugin.json VERSIONS.md
          if git diff --cached --quiet; then
            echo "Metadata is already resolved"
            exit 0
          fi
          git commit -m "fix: resolve release metadata against upstream 2.8.6"
          git push origin HEAD:feature/market-research-skill
